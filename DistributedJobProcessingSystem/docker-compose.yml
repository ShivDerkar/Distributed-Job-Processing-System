services:
  postgres:
    image: postgres:16
    container_name: distributedjob-postgres
    environment:
      POSTGRES_USER: distributed_user
      POSTGRES_PASSWORD: distributed_password
      POSTGRES_DB: distributed_job_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: distributedjob-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: